<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>UI5 Gen</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
    </style>
    <script>
        document.documentElement.lang = navigator.language || "pt-BR";
    </script>
    <script>
        window.ui5generatorConfig = window.ui5generatorConfig || {
            backend: {
                endpoint: "",
                authType: "none"
            }
        };
    </script>
    <script src="appConfig.js"></script>
    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/1.136.1/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon_dark"
        data-sap-ui-resourceroots='{
            "ui5generator": "./"
        }'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        data-name="ui5generator"
        data-id="container"
        data-settings='{"id" : "ui5generator"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
